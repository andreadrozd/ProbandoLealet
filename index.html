<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Alertas - SRH y ADA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }
        .top-section {
            display: flex;
            flex: 1;
            gap: 10px;
            padding: 10px;
        }
        .map-container {
            flex: 1;
            position: relative;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #map {
            width: 100%;
            height: 100%;
            border-radius: 5px;
        }
        .right-panels {
            display: flex;
            flex-direction: column;
            width: 300px;
            gap: 10px;
        }
        .panel {
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            background-color: #2c5282;
            color: white;
            padding: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        .panel-header:hover {
            background-color: #1e3a5f;
        }
        .panel-toggle {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }
        .panel-content {
            padding: 12px;
            overflow-y: auto;
            flex: 1;
            max-height: 300px;
        }
        .panel.collapsed .panel-content {
            display: none;
        }
        .layer-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .layer-item:last-child {
            border-bottom: none;
        }
        .layer-item input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .layer-item label {
            cursor: pointer;
            flex: 1;
        }
        .legend-item {
            margin-bottom: 12px;
            font-size: 13px;
        }
        .legend-color {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid #999;
            vertical-align: middle;
        }
        .legend-symbol {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 8px;
            vertical-align: middle;
        }
        .bottom-section {
            padding: 10px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 0 10px 10px 10px;
            max-height: 350px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chart-header {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            color: #2c5282;
        }
        #chartContainer {
            flex: 1;
            position: relative;
            min-height: 250px;
        }
        .title {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            font-weight: bold;
            background-color: rgba(255,255,255,0.9);
            padding: 8px 12px;
            border-radius: 5px;
            z-index: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-section">
            <div class="map-container">
                <div class="title">Alertas 2025-05-05</div>
                <div id="map"></div>
            </div>
            <div class="right-panels">
                <div class="panel">
                    <div class="panel-header">
                        <span>Capas activas</span>
                        <span class="panel-toggle">−</span>
                    </div>
                    <div class="panel-content">
                        <div class="layer-item">
                            <input type="checkbox" id="chk-srh" checked>
                            <label for="chk-srh">SRH</label>
                        </div>
                        <div class="layer-item">
                            <input type="checkbox" id="chk-ada" checked>
                            <label for="chk-ada">ADA</label>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <span>Leyenda</span>
                        <span class="panel-toggle">−</span>
                    </div>
                    <div class="panel-content">
                        <div class="legend-item"><strong>Nivel de Alerta:</strong></div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #2ecc71;"></span>
                            1 - Verde
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #f1c40f;"></span>
                            2 - Amarillo
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #e67e22;"></span>
                            3 - Naranja
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background-color: #e74c3c;"></span>
                            4 - Rojo
                        </div>
                        <div class="legend-item" style="margin-top: 15px;"><strong>Variación:</strong></div>
                        <div class="legend-item">● Círculo = Estable</div>
                        <div class="legend-item">▲ Flecha arriba = En aumento</div>
                        <div class="legend-item">▼ Flecha abajo = En disminución</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="chart-header">Distribución de Alertas (Capas Activas)</div>
            <div id="chartContainer">
                <canvas id="alertChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const map = L.map('map').setView([-34.6037, -58.3816], 10);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        let geoJsonLayerSRH = null;
        let geoJsonLayerADA = null;
        let chart = null;

        // Colores por Alerta
        const alertColors = {
            1: '#2ecc71',
            2: '#f1c40f',
            3: '#e67e22',
            4: '#e74c3c'
        };

        // Crear símbolo según Dif
        function createSymbol(dif, alerta) {
            const color = alertColors[alerta] || '#999';
            
            if (dif === 0) {
                // Círculo
                return L.circleMarker([0, 0], {
                    radius: 8,
                    fillColor: color,
                    color: '#333',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                });
            } else if (dif === 1) {
                // Flecha arriba
                return L.divIcon({
                    html: `<div style="color: ${color}; font-size: 24px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">▲</div>`,
                    iconSize: [24, 24],
                    className: ''
                });
            } else if (dif === -1) {
                // Flecha abajo
                return L.divIcon({
                    html: `<div style="color: ${color}; font-size: 24px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">▼</div>`,
                    iconSize: [24, 24],
                    className: ''
                });
            }
        }

        // Crear popup con campos específicos
        function createPopup(feature, layer, fields) {
            let popupContent = '<div style="font-size: 12px;">';
            fields.forEach(field => {
                const value = feature.properties[field] || 'N/A';
                popupContent += `<strong>${field}:</strong> ${value}<br>`;
            });
            popupContent += '</div>';
            return popupContent;
        }

        // Cargar capa SRH
        function loadSRH() {
            fetch('mi-capa.geojson')
                .then(response => response.json())
                .then(data => {
                    if (geoJsonLayerSRH) map.removeLayer(geoJsonLayerSRH);
                    
                    geoJsonLayerSRH = L.geoJSON(data, {
                        pointToLayer: (feature, latlng) => {
                            const alerta = feature.properties.Alerta;
                            const dif = feature.properties.Dif;
                            
                            if (dif === 0) {
                                return L.circleMarker(latlng, {
                                    radius: 8,
                                    fillColor: alertColors[alerta] || '#999',
                                    color: '#333',
                                    weight: 2,
                                    opacity: 1,
                                    fillOpacity: 0.8
                                });
                            } else if (dif === 1 || dif === -1) {
                                const symbol = dif === 1 ? '▲' : '▼';
                                return L.marker(latlng, {
                                    icon: L.divIcon({
                                        html: `<div style="color: ${alertColors[alerta] || '#999'}; font-size: 24px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">` + symbol + `</div>`,
                                        iconSize: [24, 24],
                                        className: ''
                                    })
                                });
                            }
                        },
                        onEachFeature: (feature, layer) => {
                            const popup = createPopup(feature, layer, ['MUNICIPIO', 'PUNTO', 'S2 Fecha', 'S3 Fecha', 'info']);
                            layer.bindPopup(popup);
                        }
                    }).addTo(map);
                    
                    updateChart();
                })
                .catch(error => console.error('Error cargando SRH:', error));
        }

        // Cargar capa ADA
        function loadADA() {
            fetch('mi-capa-ada.geojson')
                .then(response => response.json())
                .then(data => {
                    if (geoJsonLayerADA) map.removeLayer(geoJsonLayerADA);
                    
                    geoJsonLayerADA = L.geoJSON(data, {
                        pointToLayer: (feature, latlng) => {
                            const alerta = feature.properties.Alerta;
                            const dif = feature.properties.Dif;
                            
                            if (dif === 0) {
                                return L.circleMarker(latlng, {
                                    radius: 8,
                                    fillColor: alertColors[alerta] || '#999',
                                    color: '#333',
                                    weight: 2,
                                    opacity: 1,
                                    fillOpacity: 0.8
                                });
                            } else if (dif === 1 || dif === -1) {
                                const symbol = dif === 1 ? '▲' : '▼';
                                return L.marker(latlng, {
                                    icon: L.divIcon({
                                        html: `<div style="color: ${alertColors[alerta] || '#999'}; font-size: 24px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">` + symbol + `</div>`,
                                        iconSize: [24, 24],
                                        className: ''
                                    })
                                });
                            }
                        },
                        onEachFeature: (feature, layer) => {
                            const popup = createPopup(feature, layer, ['Nombre', 'Laguna', 'S2 Fecha', 'S3 Fecha', 'info']);
                            layer.bindPopup(popup);
                        }
                    }).addTo(map);
                    
                    updateChart();
                })
                .catch(error => console.error('Error cargando ADA:', error));
        }

        // Contar alertas visibles en el viewport actual
        function countAlertsInView() {
            const counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
            const bounds = map.getBounds();

            function countLayer(layer) {
                if (layer && layer.eachLayer) {
                    layer.eachLayer(marker => {
                        if (bounds.contains(marker.getLatLng())) {
                            const alerta = marker.feature.properties.Alerta;
                            if (counts.hasOwnProperty(alerta)) {
                                counts[alerta]++;
                            }
                        }
                    });
                }
            }

            if (document.getElementById('chk-srh').checked) {
                countLayer(geoJsonLayerSRH);
            }
            if (document.getElementById('chk-ada').checked) {
                countLayer(geoJsonLayerADA);
            }

            return counts;
        }

        // Actualizar gráfico de torta
        function updateChart() {
            const counts = countAlertsInView();
            const total = counts[1] + counts[2] + counts[3] + counts[4];
            
            const ctx = document.getElementById('alertChart').getContext('2d');
            
            if (chart) {
                chart.data.datasets[0].data = [counts[1], counts[2], counts[3], counts[4]];
                chart.options.plugins.title.text = total > 0 ? `Total: ${total} alertas` : 'Sin alertas en esta vista';
                chart.update();
            } else {
                chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Verde (1)', 'Amarillo (2)', 'Naranja (3)', 'Rojo (4)'],
                        datasets: [{
                            data: [counts[1], counts[2], counts[3], counts[4]],
                            backgroundColor: ['#2ecc71', '#f1c40f', '#e67e22', '#e74c3c'],
                            borderColor: ['#27ae60', '#f39c12', '#d35400', '#c0392b'],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { font: { size: 12 } }
                            },
                            title: {
                                display: true,
                                text: total > 0 ? `Total: ${total} alertas` : 'Sin alertas en esta vista',
                                font: { size: 14, weight: 'bold' }
                            }
                        }
                    }
                });
            }
        }

        // Eventos de checkbox
        document.getElementById('chk-srh').addEventListener('change', (e) => {
            if (e.target.checked) {
                loadSRH();
            } else if (geoJsonLayerSRH) {
                map.removeLayer(geoJsonLayerSRH);
                geoJsonLayerSRH = null;
            }
            updateChart();
        });

        document.getElementById('chk-ada').addEventListener('change', (e) => {
            if (e.target.checked) {
                loadADA();
            } else if (geoJsonLayerADA) {
                map.removeLayer(geoJsonLayerADA);
                geoJsonLayerADA = null;
            }
            updateChart();
        });

        // Minimizar/Expandir paneles
        document.querySelectorAll('.panel-header').forEach(header => {
            header.addEventListener('click', () => {
                const panel = header.parentElement;
                panel.classList.toggle('collapsed');
                const toggle = header.querySelector('.panel-toggle');
                toggle.textContent = panel.classList.contains('collapsed') ? '+' : '−';
            });
        });

        // Eventos de zoom y pan para actualizar gráfico
        map.on('zoomend moveend', () => {
            updateChart();
        });

        // Cargar capas iniciales
        loadSRH();
        loadADA();
    </script>
</body>
</html>
